<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title> unknow </title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
}

canvas{
display:block;
}

#msg{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:#ff7aa8;
font-size:42px;
opacity:0;
transition:1s;
text-align:center;
text-shadow:0 0 25px #ff7aa8;
}

</style>
</head>

<body>

<div id="msg">รักเธอน้าาาา 💓</div>
<canvas id="c"></canvas>

<script>

const canvas=document.getElementById("c")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]
let exploded=false

function heart(t){

let x=16*Math.pow(Math.sin(t),3)
let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))

return {x:x,y:y}

}

function createHeart(){

particles=[]

for(let i=0;i<1800;i++){

let t=Math.random()*Math.PI*2
let p=heart(t)

/* กระจายเต็มพื้นที่หัวใจ */

let r=Math.sqrt(Math.random())

let x=p.x*r
let y=p.y*r

particles.push({

bx:x*18,
by:y*18,

x:x*18,
y:y*18,

vx:0,
vy:0

})

}

}

createHeart()

let time=0

function draw(){

ctx.fillStyle="rgba(0,0,0,0.25)"
ctx.fillRect(0,0,canvas.width,canvas.height)

time+=0.06

/* heartbeat */

let beat = 1 + Math.sin(time)*0.12

particles.forEach(p=>{

if(exploded){

p.x+=p.vx
p.y+=p.vy

}else{

p.x=p.bx
p.y=p.by

}

let px=canvas.width/2+p.x*beat
let py=canvas.height/2+p.y*beat

ctx.beginPath()
ctx.arc(px,py,2,0,Math.PI*2)

ctx.fillStyle="#ff4f8b"
ctx.shadowBlur=10
ctx.shadowColor="#ff4f8b"

ctx.fill()

})

ctx.shadowBlur=0

requestAnimationFrame(draw)

}

draw()

function explode(){

exploded=true

particles.forEach(p=>{

p.vx=(Math.random()-0.5)*14
p.vy=(Math.random()-0.5)*14

})

document.getElementById("msg").style.opacity=1

}

function resetHeart(){

exploded=false

particles.forEach(p=>{

p.x=p.bx
p.y=p.by
p.vx=0
p.vy=0

})

document.getElementById("msg").style.opacity=0

}

canvas.addEventListener("click",()=>{

if(!exploded) explode()

})

let lastShake=0

window.addEventListener("devicemotion",e=>{

let a=e.accelerationIncludingGravity
if(!a) return

let force=Math.abs(a.x)+Math.abs(a.y)+Math.abs(a.z)

if(force>35){

let now=Date.now()

if(now-lastShake>1000){

resetHeart()
lastShake=now

}

}

})

</script>

</body>
</html>
